python:
  - 3.9
  - 3.10
  - 3.11
  - 3.12

c_stdlib:
  - sysroot                  # [linux]
c_stdlib_version:
  - 2.17    # [linux]

# No explicit compiler-version pin: professor depends on yoda/root,
# which build against conda-forge's current default (gcc15 as of this
# writing); pinning gcc14 here made the solver reject every yoda/root
# build ("Unsatisfiable dependencies ... yoda==1.9.0=root636") since
# none of them were built against gcc14's ABI.

